[build-system]
build-backend = "hatchling.build"
requires = ["hatchling", "hatch-vcs"]

[project]
name = "nbl"
dynamic = ["version"]
description = "nbl"
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [{ name = "Sricharan Reddy Varra" }]
maintainers = [
    { name = "Sricharan Reddy Varra", email = "srivarra@stanford.edu" },
]
urls.Documentation = "https://nbl.readthedocs.io/"
urls.Source = "https://github.com/karadavis-lab/nbl"
urls.Home-page = "https://github.com/karadavis-lab/nbl"
dependencies = [
    "anndata",
    # for debug logging (referenced from the issue template)
    "session-info",
    "spatialdata @ git+https://github.com/srivarra/spatialdata@fsspec_bump",
    "spatialdata-plot @ git+https://github.com/scverse/spatialdata-plot@main",
    "xarray[accel,parallel]>=2024.7.0",
    "dask[array,distributed,diagnostics]>=2024.8.0",
    "dask-image>=2024.5.3",
    "numpy",
    "numba>=0.60.0",
    "pandas[performance,excel]>=2.2.2",
    "matplotlib>=3.9.1",
    "marsilea>=0.4.3",
    "treescope>=0.1.1",
    "wandb>=0.17.6",
    "natsort>=8.4.0",
    "einx>=0.3.0",
    "flox>=0.9.9",
    "universal-pathlib>=0.2.2",
    "flowsom @ git+https://github.com/saeyslab/FlowSOM_Python",
    "ipycytoscape>=1.3.3",
    "xarray-einstats[einops,numba]>=0.7.0",
    "xbatcher>=0.3.0",
    "altair[all]>=5.3.0",
    "great-tables>=0.10.0",
    "numpydantic[zarr,dask]>=1.3.0",
    "sklearn-ann[annlibs]>=0.1.2",
    "leidenalg>=0.10.2",
    "hvplot>=0.10.0",
    "selenium>=4.25.0",
    "pymupdf>=1.24.11",
    "seaborn-objects-recipes>=0.1.2",
    "boost-histogram>=1.5.0",
    "fa2-modified>=0.3.10",
]

[project.optional-dependencies]
dev = [
    "pre-commit",
    "twine>=4.0.2",
    "tach>=0.9.3",
    "ruff>=0.5.7",
    "nb-clean>=3.3.0",
]
doc = [
    "docutils>=0.8,!=0.18.*,!=0.19.*",
    "sphinx>=4",
    "sphinx-book-theme>=1.0.0",
    "myst-nb>=1.1.0",
    "sphinxcontrib-bibtex>=1.0.0",
    "setuptools",                      # Until pybtex >0.23.0 releases: https://bitbucket.org/pybtex-devs/pybtex/issues/169/
    "sphinx-autodoc-typehints",
    "sphinxext-opengraph",
    # For notebooks
    "ipykernel",
    "ipython",
    "sphinx-copybutton",
    "pandas",
    "esbonio",
    "jupyterlite-sphinx",
    "jupyterlite-pyodide-kernel",
    "sphinx-autobuild",
    "sphinx-toolbox>=3.7.0",
    "sphinx-autosummary-accessors",

]
test = ["pytest", "coverage"]
nb = ["jupyterlab", "notebook", "ipylab>=1.0.0", "buckaroo>=0.6.12"]
db = [
    "lamindb[jupyter,bionty,erdiagram,zarr,aws]>=0.75.1",
    "faker>=26.3.0",
    "faker-biology>=0.6.4",
    "graphviz>=0.20.3",
    "ipylab>=1.0.0",
]
torch = ["torch>=2.4.0", "lightning>=2.4.0", "pykan>=0.2.4", "torchdata>=0.8.0"]

[tool.coverage.run]
source = ["nbl"]
omit = ["**/test_*.py"]

[tool.pytest.ini_options]
testpaths = ["tests"]
xfail_strict = true
addopts = [
    "--import-mode=importlib", # allow using test files with same name
]


[tool.cruft]
skip = [
    "tests",
    "src/**/__init__.py",
    "src/**/basic.py",
    "docs/api.md",
    "docs/changelog.md",
    "docs/references.bib",
    "docs/references.md",
    "docs/notebooks/example.ipynb",
]
