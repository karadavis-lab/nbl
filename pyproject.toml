[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
name = "nbl"
version = "0.0.1"
description = "nbl"
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [{ name = "Sricharan Reddy Varra" }]
maintainers = [
    { name = "Sricharan Reddy Varra", email = "srivarra@stanford.edu" },
]
urls.Documentation = "https://nbl.readthedocs.io/"
urls.Source = "https://github.com/karadavis-lab/nbl"
urls.Home-page = "https://github.com/karadavis-lab/nbl"
dependencies = [
    "anndata",
    # for debug logging (referenced from the issue template)
    "session-info",
    "spatialdata @ git+https://github.com/srivarra/spatialdata@fsspec_bump",
    "spatialdata-plot>=0.2.3.post0",
    "xarray[accel,parallel]>=2024.6.0",
    "dask[array,distributed,diagnostics]>=2024.7.1",
    "dask-image>=2024.5.3",
    "numpy",
    "numba>=0.60.0",
    "pandas[performance,excel]>=2.2.2",
    "matplotlib>=3.9.1",
    "marsilea>=0.4.3",
    "treescope>=0.1.0",
    "wandb>=0.17.5",
    "natsort>=8.4.0",
    "einx>=0.3.0",
    "flox>=0.9.8",
    "universal-pathlib>=0.2.2",
    "flowsom @ git+https://github.com/saeyslab/FlowSOM_Python"
]

[project.optional-dependencies]
dev = ["pre-commit", "twine>=4.0.2"]
doc = [
    "docutils>=0.8,!=0.18.*,!=0.19.*",
    "sphinx>=4",
    "sphinx-book-theme>=1.0.0",
    "myst-nb>=1.1.0",
    "sphinxcontrib-bibtex>=1.0.0",
    "setuptools",                      # Until pybtex >0.23.0 releases: https://bitbucket.org/pybtex-devs/pybtex/issues/169/
    "sphinx-autodoc-typehints",
    "sphinxext-opengraph",
    # For notebooks
    "ipykernel",
    "ipython",
    "sphinx-copybutton",
    "pandas",
    "esbonio",
    "jupyterlite-sphinx",
    "jupyterlite-pyodide-kernel",
    "sphinx-autobuild",
    "sphinx-toolbox>=3.7.0",
    "sphinx-autosummary-accessors",

]
test = ["pytest", "coverage"]
nb = [
    "jupyterlab",
    "notebook",
    "ipylab>=1.0.0",
    "buckaroo>=0.6.12",
]
db = [
    "lamindb[jupyter,bionty,erdiagram,zarr,aws]>=0.74.3",
    "faker>=26.0.0",
    "faker-biology>=0.6.4",
    "graphviz>=0.20.3",
    "ipylab>=1.0.0",
]
jax = [
    "jax-metal>=0.1.0",
    "jax>=0.4.31",
    "jaxlib>=0.4.31",
    "equinox>=0.11.4",
    "somap>=0.1.1",
]
torch = ["torch>=2.4.0", "lightning>=2.3.3", "pykan>=0.2.3"]

[tool.coverage.run]
source = ["nbl"]
omit = ["**/test_*.py"]

[tool.pytest.ini_options]
testpaths = ["tests"]
xfail_strict = true
addopts = [
    "--import-mode=importlib", # allow using test files with same name
]


[tool.cruft]
skip = [
    "tests",
    "src/**/__init__.py",
    "src/**/basic.py",
    "docs/api.md",
    "docs/changelog.md",
    "docs/references.bib",
    "docs/references.md",
    "docs/notebooks/example.ipynb",
]
